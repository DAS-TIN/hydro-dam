name: Release

# Pushing a v* tag builds installers on all three platforms and attaches them
# to a draft release. `npm version` + `git push --follow-tags` kicks it off.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run package -- --publish never
      # Lite flavor: same app without the live-collaboration feature. Drops
      # its installers into dist/ with a -lite suffix.
      - run: npm run package:lite
      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
